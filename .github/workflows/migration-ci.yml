name: Migration CI

on:
  push:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/migration-ci.yml"
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"

jobs:
  db-reset:
    name: supabase db reset (migrations apply cleanly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pin an explicit CLI version (not `latest`): `latest` resolves the newest release via an
      # unauthenticated GitHub API call that is rate-limited on shared runner IPs, a non-deterministic
      # build input that has failed CI transiently before migrations even run. A pinned version skips
      # that call entirely -> deterministic, reproducible builds. setup-cli@v3 also moves off the
      # deprecated Node 20 runtime. Bump this deliberately when adopting a newer CLI.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply all migrations on a clean database
        run: supabase db reset

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop || true
